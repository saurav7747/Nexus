<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus · Premium Chat</title>
  <meta name="description" content="Nexus — Modern real-time messaging platform" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><text y='22' x='5' font-size='20' font-family='sans-serif' fill='white' font-weight='bold'>N</text></svg>" />

  <!-- Google Fonts (preconnect) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════════════════
     INTRO / SPLASH SCREEN
     ════════════════════════════════════════════ -->
<div id="intro-screen">
  <div class="intro-logo">Nexus</div>
  <div class="intro-tagline">Real-time messaging, reimagined</div>
  <div class="intro-loader"></div>
</div>

<!-- ════════════════════════════════════════════
     AUTH SCREEN
     ════════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <h1>Nexus</h1>
      <p>Sign in to start messaging</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Create Account</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form" id="form-login">
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="btn-primary" id="login-btn">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div class="auth-form hidden" id="form-signup">
      <div class="field-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Jane Doe" autocomplete="name" />
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <div class="auth-error" id="signup-error"></div>
      <button class="btn-primary" id="signup-btn">Create Account</button>
    </div>

  </div>
</div>

<!-- ════════════════════════════════════════════
     APP SHELL
     ════════════════════════════════════════════ -->
<div id="app-screen">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="sidebar-top">
        <span class="sidebar-brand">Nexus</span>
        <div class="sidebar-actions">
          <button class="icon-btn" title="New Chat">
            <!-- Compose icon -->
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-box">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search people…" />
      </div>
    </div>

    <div class="section-label">People</div>

    <!-- User list -->
    <div class="user-list" id="user-list"></div>

    <!-- Self (current user footer) -->
    <div class="sidebar-footer">
      <div class="avatar sm" id="self-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="self-name">—</div>
        <div class="user-status" id="self-status">Connecting…</div>
      </div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <!-- ── Chat Area ── -->
  <main class="chat-area">

    <!-- Empty state (no chat open) -->
    <div id="chat-empty" class="chat-empty">
      <div class="empty-icon">
        <!-- Chat bubble icon -->
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#3b82f6" stroke-width="1.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      <h3>No conversation open</h3>
      <p>Select a person from the sidebar to start chatting</p>
    </div>

    <!-- Chat view (active conversation) -->
    <div id="chat-view" class="chat-view">

      <!-- Header -->
      <div class="chat-header">
        <div class="avatar" id="chat-header-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="chat-header-name">—</div>
          <div class="user-status" id="chat-header-status">Offline</div>
        </div>

        <!-- Call buttons -->
        <div class="call-controls">
          <button class="call-btn" id="voice-call-btn" title="Voice call">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/>
            </svg>
          </button>
          <button class="call-btn" id="video-call-btn" title="Video call">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
          </button>
          <button class="call-btn" title="More options">
            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-container" id="messages-container">
        <!-- Messages rendered by JS -->
        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="input-row">
          <input
            type="text"
            id="msg-input"
            placeholder="Write a message…"
            autocomplete="off"
          />
          <div class="input-actions">
            <button class="input-icon-btn" title="Emoji">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 13s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9" stroke-width="3" stroke-linecap="round"/>
                <line x1="15" y1="9" x2="15.01" y2="9" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="input-icon-btn" title="Attach file">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button class="send-btn" id="send-btn" title="Send">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div><!-- /chat-view -->
  </main>

</div><!-- /app-screen -->

<!-- ════════════════════════════════════════════
     CALL OVERLAY
     ════════════════════════════════════════════ -->
<div class="call-overlay" id="call-overlay">

  <!-- VOICE CALL UI -->
  <div class="voice-call-ui" id="voice-call-ui">
    <div class="call-avatar-ring">
      <div class="call-avatar-inner" id="call-avatar">?</div>
    </div>
    <div class="call-name" id="call-name">—</div>
    <div class="call-status" id="call-status">Calling…</div>
    <div class="call-timer" id="call-timer">00:00</div>

    <div class="call-controls-row">
      <button class="ctrl-btn toggle" title="Mute">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="ctrl-btn end" id="end-call-btn" title="End call">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 013.07 9.81 19.79 19.79 0 01.02 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91"/>
          <line x1="23" y1="1" x2="1" y2="23" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn toggle" title="Speaker">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 010 14.14"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- VIDEO CALL UI -->
  <div class="video-call-ui" id="video-call-ui" style="display:none;">
    <div class="video-main">
      <!-- Remote video placeholder -->
      <svg width="80" height="80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <div class="video-main-text" id="video-peer-name">Connecting video…</div>

      <!-- Self preview -->
      <div class="video-self">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="rgba(59,130,246,0.5)" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>

    <!-- Video controls -->
    <div class="video-controls">
      <button class="ctrl-btn toggle" title="Mute mic">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="ctrl-btn toggle" title="Toggle camera">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </button>
      <button class="ctrl-btn end" id="end-call-btn-v" title="End call">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 013.07 9.81 19.79 19.79 0 01.02 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91"/>
          <line x1="23" y1="1" x2="1" y2="23" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn toggle" title="Share screen">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </button>
    </div>
  </div>

</div><!-- /call-overlay -->

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- ── Script (ES module) ── -->
<script type="module" src="script.js"></script>

</body>
</html>
